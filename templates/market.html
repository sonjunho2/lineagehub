
{% extends "base.html" %}
{% block content %}
<section class="card">
  <div class="section-head"><h1>실시간 시세</h1></div>
  <form class="toolbar">
    <select name="server_name">
      {% for s in servers %}
      <option value="{{ s }}" {% if server_name == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
    <button type="submit">적용</button>
  </form>
  <table class="table">
    <tr><th>아이템</th><th>서버</th><th>현재가</th><th>변동</th><th>거래량</th><th>차트</th><th>업데이트</th></tr>
    {% for row in rows %}
    <tr>
      <td><a href="/items/{{ row.item.id }}">{{ row.item.name }}</a></td>
      <td>{{ row.server_name }}</td>
      <td>{{ "{:,}".format(row.latest_price) }}</td>
      <td class="{% if row.change >= 0 %}up{% else %}down{% endif %}">{{ "{:+,}".format(row.change) }}</td>
      <td>{{ row.volume }}</td>
      <td><img class="spark" src="{{ row.sparkline }}"></td>
      <td>{{ row.updated_at[:16].replace('T',' ') }}</td>
    </tr>
    {% endfor %}
  </table>
</section>
{% endblock %}
