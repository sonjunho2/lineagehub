{% extends 'base.html' %}
{% block content %}
<article class="card">
  <h1>{{ post.title }}</h1>
  <p class="muted">{{ post.username }} · 조회 {{ post.views }}</p>
  <div class="post-body">{{ post.body }}</div>
  <details class="mt16">
    <summary>신고하기</summary>
    <form method="post" action="/report" class="mt16">
      <input type="hidden" name="target_type" value="post" />
      <input type="hidden" name="target_id" value="{{ post.id }}" />
      <select name="reason">
        <option value="spam">스팸</option>
        <option value="abuse">욕설/분쟁</option>
        <option value="illegal">불법/사기 의심</option>
      </select>
      <textarea name="detail" rows="3" placeholder="세부 내용"></textarea>
      <button>신고 등록</button>
    </form>
  </details>
</article>
<div class="card mt16">
  <h2>댓글</h2>
  {% for row in comments %}<div class="comment"><strong>{{ row.username }}</strong><p>{{ row.body }}</p></div>{% endfor %}
  {% if user %}
  <form method="post" action="/community/comment">
    <input type="hidden" name="post_id" value="{{ post.id }}" />
    <textarea name="body" rows="4"></textarea>
    <button>댓글 등록</button>
  </form>
  {% endif %}
</div>
{% endblock %}
